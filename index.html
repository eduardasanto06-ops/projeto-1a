<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrotech Brasil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Agricultura Tecnológica no Brasil</h1>
        <p>A transformação digital do campo à mesa</p>
    </header>

    <main>
        <section id="tech-container"></section>

        <section class="container-grafico">
            <h2>Índice de Produtividade com Tecnologia</h2>
            <div class="grafico">
                <div class="barra-grafico" data-valor="85" style="width: 0%;">+85% de Eficiência</div>
            </div>
        </section>

        <section class="container-form">
            <h2>Fique por dentro das novidades</h2>
            <form id="agro-form">
                <input type="email" id="agro-email" placeholder="Digite seu e-mail" required>
                <button type="submit">Cadastrar</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
