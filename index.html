    <style>
        /* Estilos rápidos embutidos para visualização imediata da proposta inovadora */
        :root {
            --bg-color: #0b130e;
            --card-bg: #14241b;
            --primary: #00ff66;
            --text: #e0e6e3;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Fundo Dinâmico com Linhas de Grade (estilo tecnologia de mapeamento) */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 102, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 102, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(0, 255, 102, 0.2);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        header h1 span {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
